<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulseframe - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="style.css">
    <script src="/assets/js/main.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="game-wrapper fade-in-up delay-1">
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- HUD -->
            <div id="hud" class="hidden">
                <div id="scoreDisplay">Score: 0</div>
                <div id="waveDisplay">Wave 1</div>
                <div id="nearMissIndicator" class="hidden">Near Miss +15</div>
            </div>

            <!-- Start Screen -->
            <div id="startScreen" class="overlay">
                <h1>Pulseframe</h1>
                <p>Move with your mouse.<br>Dodge the threats.<br>Collect energy.<br>Survive the pulse.</p>
                <button id="startBtn" class="btn">Start Game</button>
            </div>

            <!-- Game Over Screen -->
            <div id="gameOverScreen" class="overlay hidden">
                <h1>System Failure</h1>
                <div class="score-board">
                    <p>Score: <span id="finalScore">0</span></p>
                    <p>Best: <span id="bestScore">0</span></p>
                </div>
                <button id="retryBtn" class="btn">Retry</button>
            </div>
        </div>
    </main>
    <script src="game.js" defer></script>
</body>
</html>
