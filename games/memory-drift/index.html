<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Drift - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
    <script src="./game.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="container fade-in-up delay-1">
        <div class="game-play-layout">
            <div class="game-main-column">
                <header class="mb-4 center-content" style="min-height: auto;">
                    <h1 class="mb-2">Memory Drift</h1>
                    <p>Watch the sequence. Repeat it before it drifts away.</p>
                </header>

                <div class="memory-layout">
                    <!-- HUD -->
                    <div class="hud">
                        <div class="stat-box">
                            <span class="stat-label">Round</span>
                            <span class="stat-value" id="roundDisplay">1</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Score</span>
                            <span class="stat-value" id="scoreDisplay">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Best</span>
                            <span class="stat-value" id="bestScoreDisplay">0</span>
                        </div>
                    </div>

                    <!-- Game Container -->
                    <div id="game-container">
                        <div id="grid-container"></div>
                        
                        <!-- Overlays -->
                        <div id="startScreen" class="overlay">
                            <h2 class="overlay-title">Memory Drift</h2>
                            <button id="startBtn" class="btn">Start Run</button>
                        </div>

                        <div id="gameOverScreen" class="overlay hidden">
                            <h2 class="overlay-title">Sequence Lost</h2>
                            <p id="finalScoreDisplay">You reached round 1</p>
                            <button id="retryBtn" class="btn">Try Again</button>
                        </div>
                    </div>
                    
                    <!-- Status Text -->
                    <div class="status-panel">
                        <div id="statusText" class="status-text">Ready</div>
                    </div>
                </div>
            </div>

            <aside class="game-help-panel">
                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li>Watch the <strong>glowing sequence</strong>.</li>
                    <li>Repeat the <strong>pattern</strong> in the same order.</li>
                    <li>Each round adds <strong>one more step</strong>.</li>
                </ul>
            </aside>
        </div>
    </main>
</body>
</html>
