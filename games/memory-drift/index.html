<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Drift - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
    <script src="./game.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="fade-in-up delay-1">
        <div class="game-layout">
            <!-- LEFT: Controls & HUD -->
            <aside class="game-side-panel game-controls-panel">
                <div class="game-title-block">
                    <h1>Memory Drift</h1>
                    <p>Watch the sequence. Repeat it before it drifts away.</p>
                </div>

                <div class="game-status-box" id="statusText">Ready</div>

                <div class="game-stats-grid">
                    <div class="game-stat-card">
                        <span class="game-stat-label">Round</span>
                        <span id="roundDisplay" class="game-stat-value">1</span>
                    </div>
                    <div class="game-stat-card">
                        <span class="game-stat-label">Score</span>
                        <span id="scoreDisplay" class="game-stat-value">0</span>
                    </div>
                    <div class="game-stat-card" style="grid-column: span 2;">
                        <span class="game-stat-label">Best</span>
                        <span id="bestScoreDisplay" class="game-stat-value">0</span>
                    </div>
                </div>

                <div class="game-control-group">
                    <button id="startBtn" class="btn">Start Run</button>
                    <button id="retryBtn" class="btn btn-secondary hidden">Try Again</button>
                </div>
            </aside>

            <!-- CENTER: Game Board -->
            <section class="game-center">
                <div class="game-board-shell">
                    <div id="game-container">
                        <div id="grid-container"></div>
                        
                        <!-- Overlays -->
                        <div id="startScreen" class="overlay">
                            <h2 class="overlay-title">Memory Drift</h2>
                        </div>

                        <div id="gameOverScreen" class="overlay hidden">
                            <h2 class="overlay-title">Sequence Lost</h2>
                            <p id="finalScoreDisplay">You reached round 1</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- RIGHT: Help -->
            <aside class="game-side-panel game-help-panel">
                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li>Watch the <strong>glowing sequence</strong>.</li>
                    <li>Repeat the <strong>pattern</strong> in the same order.</li>
                    <li>Each round adds <strong>one more step</strong>.</li>
                </ul>
            </aside>
        </div>
    </main>
</body>
</html>
