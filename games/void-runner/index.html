<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Runner - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
    <script src="./game.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main>
        <div class="container void-container fade-in-up delay-1">
            <header class="mb-4 center-content" style="min-height: auto;">
                <h1 class="mb-2">Void Runner</h1>
                <p>Navigate the empty space between signals.</p>
            </header>

            <div class="void-layout fade-in-up delay-2">
                <div class="hud">
                    <div class="stat-box">
                        <span class="stat-label">Score</span>
                        <span class="stat-value" id="scoreDisplay">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Best</span>
                        <span class="stat-value" id="bestScoreDisplay">0</span>
                    </div>
                </div>

                <div id="game-container">
                    <canvas id="gameCanvas"></canvas>
                    
                    <div id="startScreen" class="overlay">
                        <h2 class="overlay-title">Void Runner</h2>
                        <p class="overlay-desc">Avoid the fragments. Collect the light. Use mouse/touch to move.</p>
                        <button id="startBtn" class="btn">Start Run</button>
                    </div>

                    <div id="gameOverScreen" class="overlay hidden">
                        <h2 class="overlay-title">Signal Lost</h2>
                        <p id="finalScoreText">Score: 0</p>
                        <button id="retryBtn" class="btn">Retry</button>
                    </div>
                </div>
                
                <p class="instruction-text">Move to survive. Stay clear of the dark debris.</p>
            </div>
        </div>
    </main>
</body>
</html>
