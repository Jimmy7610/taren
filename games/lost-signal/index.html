<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Signal — Taren Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div id="game-wrapper">
        <!-- Build Box -->
        <div class="build-box">Build 001 — Lost Signal</div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay active">
            <div class="intro-content">
                <h1 data-lang-key="game_title">Lost Signal</h1>
                <p class="intro-text" data-lang-key="intro_text">A strange signal is waking something beneath Taren.</p>
                <div class="start-actions">
                    <button id="start-btn" class="btn-primary" data-lang-key="ui_start">Start Expedition</button>
                    <button id="reset-btn" class="btn-secondary" data-lang-key="ui_reset">Reset Progress</button>
                </div>
            </div>
        </div>

        <!-- Game Interface -->
        <div id="game-ui" class="hidden">
            <!-- Scene Viewport -->
            <div id="scene-viewport">
                <div id="scene-container"></div>
                <div id="hotspot-layer"></div>
                
                <!-- Player Placeholder (Nilo) -->
                <div id="player-nilo" class="player-marker">
                    <div class="marker-dot"></div>
                    <span class="marker-label">Nilo</span>
                    <!-- 
                        INSTÄLLNING - Här läggs den riktiga karaktärsbilden till senare:
                        /games/lost-signal/assets/characters/nilo-idle.webp
                    -->
                </div>

                <!-- VFX Layer -->
                <div class="vfx-layer fog"></div>
                <div class="vfx-layer vignette"></div>
                <div class="vfx-layer lights"></div>
            </div>

            <!-- Dialogue Panel -->
            <div id="dialogue-panel">
                <p id="dialogue-text"></p>
                <span class="close-hint">Click anywhere to close</span>
            </div>

            <!-- Bottom Bar: Inventory & Controls -->
            <div id="bottom-bar">
                <div class="inventory-section">
                    <h3 data-lang-key="ui_inventory">Inventory</h3>
                    <div id="inventory-bar"></div>
                </div>
                
                <div class="controls-section">
                    <div class="toggle-group">
                        <button id="lang-toggle" class="btn-small">EN/SV</button>
                        <button id="theme-toggle" class="btn-small">Theme</button>
                        <button id="mute-toggle" class="btn-small">Mute</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Script -->
    <script type="module" src="game.js"></script>
</body>
</html>
