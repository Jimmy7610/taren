<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Signal — Den dag Taren ringde tillbaka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div id="game-wrapper">
        <!-- Build Box -->
        <div class="build-box">Build 124 — Den dag Taren ringde tillbaka</div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div class="intro-content">
                <h1 data-lang-key="game_title">Lost Signal</h1>
                <p class="subtitle">Den dag Taren ringde tillbaka</p>
                <div class="start-actions">
                    <button id="start-btn" class="btn-primary">Start Expedition</button>
                    <button id="reset-btn" class="btn-secondary">Reset Progress</button>
                </div>
            </div>
        </div>

        <!-- Game Interface -->
        <div id="game-ui" class="hidden">
            <!-- Sidebar -->
            <aside id="game-sidebar">
                <div class="sidebar-header">
                    <h2 data-lang-key="game_title">Lost Signal</h2>
                    <div id="scene-title">---</div>
                </div>

                <div class="sidebar-section">
                    <h3>Objective</h3>
                    <p id="current-objective">---</p>
                </div>

                <div class="sidebar-section">
                    <h3>Inventory</h3>
                    <div id="inventory-bar"></div>
                </div>

                <div class="signal-container">
                    <h3>Signal Strength</h3>
                    <div class="meter-outer">
                        <div id="signal-value"></div>
                    </div>
                </div>

                <div class="sidebar-footer">
                    <div class="toggle-group">
                        <button id="lang-toggle" class="btn-tiny">EN/SV</button>
                        <button id="theme-toggle" class="btn-tiny">Theme</button>
                    </div>
                </div>
            </aside>

            <!-- Main Area -->
            <main id="game-main">
                <div id="scene-viewport">
                    <div id="scene-container"></div>
                    <div id="hotspot-layer"></div>
                    <svg id="hotspot-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
                </div>

                <div id="dialogue-panel">
                    <p id="dialogue-text"></p>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/build.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
