<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lantern Below - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
    <script src="./game.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="container fade-in-up delay-1">
        <div class="game-play-layout">
            <div class="game-main-column">
                <header class="mb-4 center-content" style="min-height: auto;">
                    <h1 class="mb-2">The Lantern Below</h1>
                    <p>Find the lower light.</p>
                </header>

                <div class="lantern-layout">
                    <div class="hud">
                        <div class="stat-box">
                            <span class="stat-label">Light</span>
                            <span class="stat-value" id="lightCount">0 / 7</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Keys</span>
                            <span class="stat-value" id="keyCount">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Gate</span>
                            <span class="stat-value" id="gateStatus">Sealed</span>
                        </div>
                    </div>

                    <div id="game-container">
                        <canvas id="gameCanvas"></canvas>
                        
                        <div id="startScreen" class="overlay">
                            <h2 class="overlay-title">The Lantern Below</h2>
                            <p class="overlay-desc">Explore the depths. Reveal what is hidden.</p>
                            <button id="startBtn" class="btn">Enter the Deep</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="game-help-panel">
                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li>Move with <strong>WASD</strong> or <strong>arrows</strong>.</li>
                    <li>Follow the <strong>lantern light</strong> to see.</li>
                    <li>Collect <strong>fragments</strong> and open gates.</li>
                </ul>
            </aside>
        </div>
    </main>
</body>
</html>
