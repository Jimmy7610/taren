<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourfold - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="fade-in-up delay-1">
        <div class="game-layout">
            <!-- LEFT: Controls & HUD -->
            <aside class="game-side-panel game-controls-panel">
                <div class="game-title-block">
                    <h1>Fourfold</h1>
                    <p>Drop pieces. Connect four.</p>
                </div>

                <div class="game-status-box" id="turnDisplay">Your Turn</div>

                <div class="game-stats-grid">
                    <div class="game-stat-card">
                        <span class="game-stat-label">You</span>
                        <span id="playerScore" class="game-stat-value">0</span>
                    </div>
                    <div class="game-stat-card">
                        <span class="game-stat-label">CPU</span>
                        <span id="computerScore" class="game-stat-value">0</span>
                    </div>
                    <div class="game-stat-card" style="grid-column: span 2;">
                        <span class="game-stat-label">Draws</span>
                        <span id="drawScore" class="game-stat-value">0</span>
                    </div>
                </div>

                <div class="game-control-group">
                    <span class="game-stat-label">Difficulty</span>
                    <div class="game-actions difficulty-toggle">
                        <button class="diff-btn" data-value="easy">Easy</button>
                        <button class="diff-btn" data-value="normal">Normal</button>
                        <button class="diff-btn" data-value="hard">Hard</button>
                    </div>
                </div>

                <div class="game-control-group">
                    <button id="newRoundBtn" class="btn">New Round</button>
                    <button id="resetScoreBtn" class="btn btn-secondary">Reset Score</button>
                </div>
            </aside>

            <!-- CENTER: Game Board -->
            <section class="game-center">
                <div class="game-board-shell">
                    <div class="board-area">
                        <div id="statusOverlay" class="game-overlay hidden"></div>
                        <div id="board" class="board">
                            <!-- Board cells generated via JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- RIGHT: Help -->
            <aside class="game-side-panel game-help-panel">
                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li>Drop a piece into any open column.</li>
                    <li>Connect <strong>four</strong> horizontally, vertically, or diagonally.</li>
                    <li>Choose a difficulty and outplay the Computer.</li>
                </ul>
            </aside>
        </div>
    </main>

    <script src="./game.js"></script>
</body>
</html>
