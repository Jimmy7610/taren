<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourfold - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="container py-8">
        <div class="game-play-layout fade-in-up delay-1">
            <div class="game-main-column">
                <header class="text-center mb-8">
                    <h1 class="mb-2">Fourfold</h1>
                    <p class="subtitle">Drop pieces. Connect four.</p>
                </header>

                <div class="game-module">
                    <div class="hud">
                        <div class="hud-section turn-section">
                            <span class="hud-label">Turn</span>
                            <span id="turnDisplay" class="hud-value">You</span>
                        </div>
                        
                        <div class="hud-section difficulty-section">
                            <span class="hud-label">Difficulty</span>
                            <div class="difficulty-toggle">
                                <button class="diff-btn" data-value="easy">Easy</button>
                                <button class="diff-btn active" data-value="normal">Normal</button>
                                <button class="diff-btn" data-value="hard">Hard</button>
                            </div>
                        </div>

                        <div class="hud-section score-section">
                            <div class="score-item">
                                <span class="hud-label">You</span>
                                <span id="playerScore" class="hud-value">0</span>
                            </div>
                            <div class="score-divider"></div>
                            <div class="score-item">
                                <span class="hud-label">Computer</span>
                                <span id="computerScore" class="hud-value">0</span>
                            </div>
                            <div class="score-divider"></div>
                            <div class="score-item">
                                <span class="hud-label">Draws</span>
                                <span id="drawScore" class="hud-value">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="board-area">
                        <div id="statusOverlay" class="status-overlay"></div>
                        <div id="board" class="board">
                            <!-- Board cells generated via JS -->
                        </div>
                    </div>

                    <div class="action-bar">
                        <button id="newRoundBtn" class="btn btn-primary">New Round</button>
                        <button id="resetScoreBtn" class="btn btn-ghost">Reset Score</button>
                    </div>
                </div>
            </div>

            <aside class="game-help-panel">
                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li>Drop a piece into any open column.</li>
                    <li>Connect <strong>four</strong> horizontally, vertically, or diagonally.</li>
                    <li>Choose a difficulty and outplay the Computer.</li>
                </ul>
            </aside>
        </div>
    </main>

    <script src="./game.js"></script>
</body>
</html>
