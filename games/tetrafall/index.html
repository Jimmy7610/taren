<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetrafall - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="container py-8">
        <div class="game-play-layout fade-in-up delay-1">
            <div class="game-main-column">
                <header class="text-center mb-6">
                    <h1 class="mb-2">Tetrafall</h1>
                    <p>Shape the fall. Clear the lines.</p>
                </header>

                <div class="tetrafall-module">
                    <div class="game-layout">
                        <!-- Left Side: Hold -->
                        <div class="side-panel">
                            <div class="preview-box">
                                <span class="preview-label">Hold</span>
                                <div id="hold-preview" class="preview-grid"></div>
                            </div>
                            
                            <div class="hud-stats mt-auto">
                                <div class="stat-item">
                                    <span class="stat-label">Level</span>
                                    <span id="level" class="stat-value">1</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Lines</span>
                                    <span id="lines" class="stat-value">0</span>
                                </div>
                            </div>
                        </div>

                        <!-- Center: Board -->
                        <div class="board-container">
                            <div id="status-overlay" class="status-overlay"></div>
                            <div id="board" class="board"></div>
                        </div>

                        <!-- Right Side: Next -->
                        <div class="side-panel">
                            <div class="preview-box">
                                <span class="preview-label">Next</span>
                                <div id="next-preview" class="preview-grid"></div>
                            </div>

                            <div class="hud-stats mt-auto">
                                <div class="stat-item">
                                    <span class="stat-label">Score</span>
                                    <span id="score" class="stat-value">0</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Best</span>
                                    <span id="best-score" class="stat-value">0</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="game-controls">
                        <button id="new-game-btn" class="btn btn-primary">New Game</button>
                        <button id="pause-btn" class="btn btn-ghost">Pause</button>
                    </div>
                </div>
            </div>

            <aside class="game-help-panel">
                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li><strong>WASD / Arrows</strong> to move and rotate.</li>
                    <li><strong>Space</strong> for Hard Drop.</li>
                    <li><strong>C</strong> to Hold piece.</li>
                    <li><strong>P</strong> to Pause game.</li>
                    <li>Clear full lines to score and level up.</li>
                </ul>
            </aside>
        </div>
    </main>

    <script src="./game.js"></script>
</body>
</html>
