<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetrafall - Taren</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="./style.css">
    <script src="/assets/js/build.js" defer></script>
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link active">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="fade-in-up delay-1">
        <div class="game-layout">
            <!-- LEFT: Controls & HUD -->
            <aside class="game-side-panel game-controls-panel">
                <div class="game-title-block">
                    <h1>Tetrafall</h1>
                    <p>Shape the fall. Clear the lines.</p>
                </div>

                <div class="game-status-box" id="game-status">Operational</div>

                <div class="game-stats-grid">
                    <div class="game-stat-card">
                        <span class="game-stat-label">Level</span>
                        <span id="level" class="game-stat-value">1</span>
                    </div>
                    <div class="game-stat-card">
                        <span class="game-stat-label">Lines</span>
                        <span id="lines" class="game-stat-value">0</span>
                    </div>
                    <div class="game-stat-card">
                        <span class="game-stat-label">Score</span>
                        <span id="score" class="game-stat-value">0</span>
                    </div>
                    <div class="game-stat-card">
                        <span class="game-stat-label">Best</span>
                        <span id="best-score" class="game-stat-value">0</span>
                    </div>
                </div>

                <div class="game-control-group">
                    <div class="preview-box">
                        <span class="preview-label">Hold</span>
                        <div id="hold-preview" class="preview-grid"></div>
                    </div>
                </div>

                <div class="game-control-group">
                    <button id="new-game-btn" class="btn">New Game</button>
                    <button id="pause-btn" class="btn btn-secondary">Pause</button>
                </div>
            </aside>

            <!-- CENTER: Game Board -->
            <section class="game-center">
                <div class="game-board-shell">
                    <div class="board-container">
                        <div id="status-overlay" class="game-overlay hidden"></div>
                        <div id="board" class="board"></div>
                    </div>
                </div>
            </section>

            <!-- RIGHT: Help & Next -->
            <aside class="game-side-panel game-help-panel">
                <div class="game-control-group" style="margin-bottom: 2rem;">
                    <div class="preview-box">
                        <span class="preview-label">Next</span>
                        <div id="next-preview" class="preview-grid"></div>
                    </div>
                </div>

                <h2 class="game-help-title">How to play</h2>
                <ul class="game-help-list">
                    <li><strong>WASD / Arrows</strong> to move and rotate.</li>
                    <li><strong>Space</strong> for Hard Drop.</li>
                    <li><strong>C</strong> to Hold piece.</li>
                    <li><strong>P</strong> to Pause game.</li>
                    <li>Clear full lines to score and level up.</li>
                </ul>
            </aside>
        </div>
    </main>

    <script src="./game.js"></script>
</body>
</html>
