<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Pond - Taren Experiment</title>
    <meta name="description" content="A calm interactive water-like particle field experiment.">
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar fade-in-up">
        <div class="container nav-container">
            <a href="/" class="nav-link">Taren</a>
            <a href="/games/" class="nav-link">Games</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <main class="experiment-shell center-content fade-in-up delay-1">
        <div class="experiment-header">
            <h1 class="experiment-title">Signal Pond</h1>
            <p class="experiment-desc">A calm interactive particle field. Move your mouse over the pond.</p>
        </div>

        <div class="pond-container">
            <canvas id="pondCanvas"></canvas>
            
            <div class="audio-controls" id="audioControls">
                <button id="startAudioBtn" class="btn">Start Sound</button>
                <div class="audio-mixer hidden" id="audioMixer">
                    <button id="muteBtn" class="btn btn-secondary">Mute</button>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" class="volume-slider" title="Volume">
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
