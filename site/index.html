<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Taren</title>
    <link rel="stylesheet" href="/assets/ui.css">
    <link rel="stylesheet" href="/assets/index.css">
    <script defer src="/assets/ui.js"></script>
</head>

<body class="star-map-body">
    <div class="vignette"></div>

    <!-- 1. Background Layer (Parallax enabled) -->
    <div class="background-layer parallax" data-depth="2">
        <div class="star-dust"></div>
    </div>

    <!-- 2. Instrument Layer (Static) -->
    <div class="instrument-layer">
        <div class="compass-ring"></div>
        <div class="crosshair-h"></div>
        <div class="crosshair-v"></div>
    </div>

    <!-- 3. Content Layer (Static) -->
    <div class="content-layer">
        <div class="center-anchor">
            <h1 data-i18n="title">Taren</h1>
            <p data-i18n="tagline">Något nytt tar form.</p>
        </div>

        <div class="orbit-system">
            <div class="node">
                <div class="node-point"></div>
                <a href="/games/" data-i18n="games">Spel</a>
                <div class="node-micro" data-i18n="micro_games">Prova något litet.</div>
            </div>
            <div class="node">
                <div class="node-point"></div>
                <a href="/experiments/" data-i18n="experiments">Experiment</a>
                <div class="node-micro" data-i18n="micro_experiments">Peta på kanterna.</div>
            </div>
            <div class="node">
                <div class="node-point"></div>
                <a href="/sketches/" data-i18n="sketches">Skisser</a>
                <div class="node-micro" data-i18n="micro_sketches">Fragment & former.</div>
            </div>
            <div class="node">
                <div class="node-point"></div>
                <a href="/texts/" data-i18n="texts">Texter</a>
                <div class="node-micro" data-i18n="micro_texts">Noter ur dimman.</div>
            </div>
            <div class="node">
                <div class="node-point"></div>
                <a href="/ongoing/" data-i18n="ongoing">Pågår</a>
                <div class="node-micro" data-i18n="micro_ongoing">Tar fortfarande form.</div>
            </div>
        </div>
    </div>
</body>

</html>
