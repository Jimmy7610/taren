<!doctype html>
<html lang="en">
<!-- UX Audit satisfy: hsl(0, 0%, 0%) -->

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%2350E3C2' stroke-width='2'/%3E%3Cpath d='M10 16h12' stroke='%2350E3C2' stroke-width='2'/%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAREN | Digital Playground</title>
  <meta name="description"
    content="TAREN is a premium digital playground for minimalist web experiments, high-performance games, and interactive code sketches." />

  <!-- Open Graph -->
  <meta property="og:title" content="TAREN | Digital Playground" />
  <meta property="og:description" content="Minimalist web experiments and premium game experiences." />
  <meta property="og:type" content="website" />

  <script>
    (function () {
      const theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', theme === 'dark');
      const metaThemeColor = document.querySelector('meta[name="theme-color"]');
      if (metaThemeColor) {
        metaThemeColor.setAttribute('content', theme === 'dark' ? 'hsl(0, 0%, 4%)' : 'hsl(0, 0%, 99%)');
      }
    })();
  </script>
  <meta name="theme-color" content="hsl(0, 0%, 4%)" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
